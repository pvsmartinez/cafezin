<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Página não encontrada | Cafezin</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Vollkorn:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1c1610;
      color: #cdb89f;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .page-icon {
      width: 64px;
      height: 80px;
      margin: 0 auto 28px;
      position: relative;
    }

    .page-icon svg {
      width: 100%;
      height: 100%;
      opacity: 0.25;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #4ecfb8;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Vollkorn', Georgia, 'Times New Roman', serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      color: #dcc9ac;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    p {
      font-size: 15px;
      line-height: 1.75;
      color: #856e53;
      margin-bottom: 32px;
    }

    a {
      display: inline-block;
      background: #4ecfb8;
      color: #1c1610;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 11px 28px;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    a:hover { opacity: 0.82; }
  </style>
</head>
<body>
  <div class="card">
    <div class="page-icon">
      <!-- folha de papel em branco -->
      <svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="46" height="58" rx="3" fill="#cdb89f"/>
        <path d="M50 4 L60 14 L50 14 Z" fill="#856e53"/>
        <rect x="12" y="24" width="28" height="3" rx="1.5" fill="#856e53" opacity="0.5"/>
        <rect x="12" y="33" width="22" height="3" rx="1.5" fill="#856e53" opacity="0.4"/>
        <rect x="12" y="42" width="18" height="3" rx="1.5" fill="#856e53" opacity="0.3"/>
      </svg>
    </div>
    <p class="label">Erro 404</p>
    <h1>Página não encontrada</h1>
    <p>
      Esse caminho não existe no Cafezin.<br>
      Talvez o link esteja errado ou a página tenha sido movida.
    </p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
