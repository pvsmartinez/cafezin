name: Release — Windows

# Roda APENAS quando disparado manualmente.
# macOS e Android são buildados localmente (scripts/build-mac.sh).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: v0.2.0) — obrigatório"
        required: true

env:
  APP_NAME: Cafezin

jobs:
  # ── Windows — .msi + .exe (signed for updater) ──────────────────────────
  build-windows:
    name: Windows (.msi + .exe)
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps
        working-directory: app
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Windows MSI + NSIS (signed)
        run: npm run tauri build -- --bundles msi,nsis
        working-directory: app

      - name: Collect installers + updater bundles
        id: installers
        shell: bash
        run: |
          # Tauri v2 format: .exe + .exe.sig (no zip), .msi + .msi.sig
          MSI=$(find app/src-tauri/target/release/bundle/msi -name "*.msi" | grep -v \.sig | head -1)
          MSI_SIG=$(find app/src-tauri/target/release/bundle/msi -name "*.msi.sig" | head -1)
          EXE=$(find app/src-tauri/target/release/bundle/nsis -name "*.exe" | grep -v \.sig | head -1)
          EXE_SIG=$(find app/src-tauri/target/release/bundle/nsis -name "*.exe.sig" | head -1)
          echo "msi=$MSI"         >> $GITHUB_OUTPUT
          echo "msi_sig=$MSI_SIG" >> $GITHUB_OUTPUT
          echo "exe=$EXE"         >> $GITHUB_OUTPUT
          echo "exe_sig=$EXE_SIG" >> $GITHUB_OUTPUT
          echo "--- Found files ---"
          echo "MSI:     $MSI"
          echo "MSI_SIG: $MSI_SIG"
          echo "EXE:     $EXE"
          echo "EXE_SIG: $EXE_SIG"

      - name: Validate updater artifacts
        shell: bash
        run: |
          test -n "${{ steps.installers.outputs.exe }}"
          test -f "${{ steps.installers.outputs.exe }}"
          test -n "${{ steps.installers.outputs.exe_sig }}"
          test -f "${{ steps.installers.outputs.exe_sig }}"

      - name: Rename files for release
        shell: bash
        run: |
          cp "${{ steps.installers.outputs.exe }}"     Cafezin_setup.exe
          cp "${{ steps.installers.outputs.exe_sig }}" Cafezin_setup.exe.sig
          [ -f "${{ steps.installers.outputs.msi }}" ] && cp "${{ steps.installers.outputs.msi }}" Cafezin_setup.msi || true
          [ -f "${{ steps.installers.outputs.msi_sig }}" ] && cp "${{ steps.installers.outputs.msi_sig }}" Cafezin_setup.msi.sig || true

      - name: Store signature artifact
        id: sigs
        shell: bash
        run: |
          mkdir -p artifacts
          cp "${{ steps.installers.outputs.exe_sig }}" artifacts/windows.exe.sig
          EXE_SIG=$(cat "${{ steps.installers.outputs.exe_sig }}")
          echo "exe_signature=$EXE_SIG" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            Cafezin_setup.exe
            Cafezin_setup.exe.sig
            Cafezin_setup.msi
            Cafezin_setup.msi.sig
          if-no-files-found: warn

      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-sigs
          path: artifacts/

  # ── Publish GitHub Release + update latest.json ─────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f | sort

      - name: Create Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ env.APP_NAME }} ${{ inputs.tag }}
          draft: false
          prerelease: false
          files: |
            windows-installers/Cafezin_setup.exe
            windows-installers/Cafezin_setup.exe.sig
            windows-installers/Cafezin_setup.msi
            windows-installers/Cafezin_setup.msi.sig

      - name: Update update/latest.json (Windows entry)
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/pvsmartinez/cafezin/releases/download/${TAG}"
          EXE_SIG=""
          if [ -f windows-sigs/windows.exe.sig ]; then
            EXE_SIG=$(cat windows-sigs/windows.exe.sig)
          fi
          export VERSION BASE EXE_SIG
          python3 <<'PY'
          import json, os
          from datetime import datetime, timezone

          with open('update/latest.json', 'r') as f:
            data = json.load(f)

          version = os.environ['VERSION']
          base = os.environ['BASE']
          sig = os.environ.get('EXE_SIG', '')

          data['version'] = version
          data['pub_date'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          data.setdefault('platforms', {})
          data['platforms']['windows-x86_64'] = {
            'url': f'{base}/Cafezin_setup.exe',
            'signature': sig,
          }

          with open('update/latest.json', 'w') as f:
            json.dump(data, f, indent=2)
            f.write('\n')
          PY

      - name: Commit and push update/latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update/latest.json
          git diff --staged --quiet || git commit -m "chore: update latest.json for ${{ inputs.tag }} [skip ci]"
          git pull --rebase
          git push
