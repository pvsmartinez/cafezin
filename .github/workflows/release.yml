name: Release — Windows

# Roda APENAS quando disparado manualmente.
# macOS e Android são buildados localmente (scripts/build-mac.sh, scripts/build-android.sh).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: v0.2.0) — obrigatório"
        required: true

env:
  APP_NAME: Cafezin

jobs:
  # ── Windows — .msi + .exe ────────────────────────────────────────────────
  build-windows:
    name: Windows (.msi + .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps
        working-directory: app

      - name: Build Windows MSI + NSIS
        run: npm run tauri build -- --bundles msi,nsis
        working-directory: app

      - name: Locate installers
        id: installers
        shell: bash
        run: |
          MSI=$(find app/src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          EXE=$(find app/src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          echo "msi=$MSI" >> $GITHUB_OUTPUT
          echo "exe=$EXE" >> $GITHUB_OUTPUT

      - name: Rename installers
        shell: bash
        run: |
          [ -f "${{ steps.installers.outputs.msi }}" ] && mv "${{ steps.installers.outputs.msi }}" Cafezin_setup.msi || true
          [ -f "${{ steps.installers.outputs.exe }}" ] && mv "${{ steps.installers.outputs.exe }}" Cafezin_setup.exe || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            Cafezin_setup.msi
            Cafezin_setup.exe

  # ── Publish GitHub Release ───────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ env.APP_NAME }} ${{ inputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            windows-installers/Cafezin_setup.msi
            windows-installers/Cafezin_setup.exe
