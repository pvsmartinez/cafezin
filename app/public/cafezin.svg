<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Warm dark brown background -->
  <rect width="100" height="100" rx="22" fill="#78350f"/>
  <!-- Steam wisps (amber/golden) -->
  <path d="M34 30 Q31 24 34 18" stroke="#fbbf24" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M50 28 Q47 22 50 16" stroke="#fbbf24" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M66 30 Q63 24 66 18" stroke="#fbbf24" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Cup body (trapezoid) -->
  <polygon points="22,38 26,74 74,74 78,38" fill="white"/>
  <!-- Coffee liquid inside -->
  <polygon points="26,44 28,70 72,70 74,44" fill="#a16207"/>
  <!-- Coffee surface -->
  <ellipse cx="50" cy="44" rx="24" ry="6" fill="#92400e"/>
  <!-- Highlight on coffee surface -->
  <ellipse cx="43" cy="42" rx="8" ry="3" fill="#d97706" opacity="0.5"/>
  <!-- Cup rim -->
  <ellipse cx="50" cy="38" rx="28" ry="7" fill="white"/>
  <!-- Handle -->
  <path d="M74 50 C92 50 92 68 74 68" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Saucer -->
  <ellipse cx="50" cy="78" rx="36" ry="8" fill="#fef3c7"/>
  <ellipse cx="50" cy="76" rx="20" ry="4" fill="#fde68a"/>
</svg>
